<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Tally Cloud Bridge - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 12px;
        }

        .header {
            padding: 20px;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--accent);
        }

        .container {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        .status-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #475569;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .indicator.on { 
            background: var(--success);
            box-shadow: 0 0 15px var(--success);
            animation: pulse 2s infinite;
        }

        .indicator.error { background: var(--danger); box-shadow: 0 0 15px var(--danger); }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .label { font-size: 0.9rem; color: #94a3b8; margin-bottom: 4px; }
        .value { font-size: 1.1rem; font-weight: 500; }

        .logs {
            grid-column: span 2;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #cbd5e1;
            overflow-y: auto;
            max-height: 150px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .log-entry { margin-bottom: 5px; opacity: 0.8; }
        .log-entry.info { color: var(--accent); }
        .log-entry.success { color: var(--success); }

        .btn-group {
            grid-column: span 2;
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        button.secondary { background: rgba(255,255,255,0.1); color: white; }

        .footer {
            padding: 10px 20px;
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            TALLY CLOUD BRIDGE
        </div>
        <div id="bridge-status" style="font-size: 0.8rem; opacity: 0.7;">v1.5.0 Stable</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="label">Connessione Locale</div>
            <div class="status-box">
                <div id="vmix-indicator" class="indicator"></div>
                <div>
                    <div class="value">vMix Tally</div>
                    <div id="vmix-ip-text" style="font-size: 0.75rem; opacity: 0.6;">localhost:8088</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="label">Connessione Cloud</div>
            <div class="status-box">
                <div id="cloud-indicator" class="indicator"></div>
                <div>
                    <div class="value">Render Node</div>
                    <div id="cloud-url-text" style="font-size: 0.75rem; opacity: 0.6;">tally-cloud.onrender.com</div>
                </div>
            </div>
        </div>

        <div class="logs" id="log-container">
            <div class="log-entry info">Inizializzazione sistema...</div>
            <div class="log-entry">Bridge UI caricata con successo.</div>
        </div>

        <div class="btn-group">
            <button onclick="openLink('https://tally-cloud.onrender.com/director.html')">Apri Regia Online</button>
            <button class="secondary" onclick="openLink('http://localhost:3000')">Impostazioni Locali</button>
        </div>
    </div>

    <div class="footer">Antigravity &copy; 2026 - Designed for Davide</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const vmixInd = document.getElementById('vmix-indicator');
        const cloudInd = document.getElementById('cloud-indicator');
        const logCont = document.getElementById('log-container');

        function addLog(msg, type = '') {
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logCont.appendChild(div);
            logCont.scrollTop = logCont.scrollHeight;
        }

        socket.on('vmixStatus', (data) => {
            if (data.connected) {
                vmixInd.className = 'indicator on';
                addLog('vMix Collegato correttamente.', 'success');
            } else {
                vmixInd.className = 'indicator';
                addLog('vMix Disconnesso o IP non valido.', 'error');
            }
        });

        // Simuliamo il monitoraggio del cloud tramite l'attività del bridge
        let lastCloudPing = 0;
        setInterval(() => {
            const diff = Date.now() - lastCloudPing;
            if (diff < 2000) {
                cloudInd.className = 'indicator on';
            } else {
                cloudInd.className = 'indicator';
            }
        }, 1000);

        socket.on('tallyUpdate', () => {
            if (Date.now() - lastCloudPing > 3000) {
                addLog('Sincronizzazione Cloud attiva.', 'info');
            }
            lastCloudPing = Date.now();
        });

        function openLink(url) {
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
